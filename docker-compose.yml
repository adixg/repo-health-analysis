services:
  postgres:
    image: postgres:16-alpine
    container_name: reposense-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-reposense}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reposense}
      POSTGRES_DB: ${POSTGRES_DB:-reposense}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reposense} -d ${POSTGRES_DB:-reposense}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
