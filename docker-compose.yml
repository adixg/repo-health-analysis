services:
  postgres:
    image: postgres:16-alpine
    container_name: reposense-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-reposense}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reposense}
      POSTGRES_DB: ${POSTGRES_DB:-reposense}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reposense} -d ${POSTGRES_DB:-reposense}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Local LLM runtime for the Checkpoint 3 grounded-chat / MCP layer.
  ollama:
    image: ollama/ollama:latest
    container_name: reposense-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama

  api:
    build: .
    container_name: reposense-api
    restart: unless-stopped
    command: ["uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres
      OLLAMA_BASE_URL: http://ollama:11434
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build: .
    container_name: reposense-dashboard
    restart: unless-stopped
    command: ["streamlit", "run", "src/dashboard/app.py", "--server.address=0.0.0.0", "--server.port=8501"]
    ports:
      - "8501:8501"
    environment:
      POSTGRES_HOST: postgres
      OLLAMA_BASE_URL: http://ollama:11434
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  ollama_data:
